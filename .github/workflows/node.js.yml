name: Filing Buddy CI

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build and deploy
        run: |
          npm ci
          npm run build

          cd server
          npm ci
          cd ..
          pm2 reload ecosystem.config.js
